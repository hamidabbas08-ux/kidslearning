name: Flutter Cloud Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Decode Keystore File Safety (100% Robust)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          python3 -c "
          import base64, os, sys
          secret = os.environ.get('KEYSTORE_BASE64', '')
          if not secret:
              print('ERROR: KEYSTORE_BASE64 secret is empty!')
              sys.exit(1)
          
          # تمام فالتو اسپیسز اور نیو لائنز کا خاتمہ
          clean_secret = ''.join(secret.split())
          
          # اگر آخر سے پیڈنگ کا '=' غائب ہے تو اسے خود کار طریقے سے درست کرنا
          missing_padding = len(clean_secret) % 4
          if missing_padding:
              clean_secret += '=' * (4 - missing_padding)
          
          try:
              decoded_data = base64.b64decode(clean_secret)
              os.makedirs('android/app', exist_ok=True)
              with open('android/app/upload-keystore.jks', 'wb') as f:
                  f.write(decoded_data)
              print('SUCCESS: Keystore file successfully decoded and written to android/app/upload-keystore.jks')
          except Exception as e:
              print(f'ERROR: Decoding failed: {e}')
              sys.exit(1)
          "

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Build Fully Signed Production APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: "upload-keystore.jks"
        run: flutter build apk --release

      - name: Build Fully Signed Play Store App Bundle (AAB)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: "upload-keystore.jks"
        run: flutter build appbundle --release

      - name: Upload Secure APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Secure AAB Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
